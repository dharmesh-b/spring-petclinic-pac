apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: spring-petclinic-build
  annotations:
    # The event we are targeting as seen from the webhook payload
    # this can be an array too, i.e: [pull_request, push]
    pipelinesascode.tekton.dev/on-event: "[pull_request, push]"

    # The branch or tag we are targeting (ie: main, refs/tags/*)
    pipelinesascode.tekton.dev/on-target-branch: "main"

    # Fetch the git-clone task from hub
    pipelinesascode.tekton.dev/task: "https://raw.githubusercontent.com/openshift-pipelines/tektoncd-catalog/refs/heads/p/tasks/task-git-clone/0.4.1/task-git-clone.yaml"

    # Fetch the maven task from hub
    pipelinesascode.tekton.dev/task-1: "https://raw.githubusercontent.com/openshift-pipelines/tektoncd-catalog/refs/heads/p/tasks/task-maven/0.4.0/task-maven.yaml"

    # Fetch the openshift-client task to trigger S2I build and tag image
    pipelinesascode.tekton.dev/task-2: "https://raw.githubusercontent.com/openshift-pipelines/tektoncd-catalog/refs/heads/p/tasks/task-openshift-client/0.2.0/task-openshift-client.yaml"

    # How many runs we want to keep attached to this event
    pipelinesascode.tekton.dev/max-keep-runs: "5"

spec:
  params:
    # The variable with brackets are special to Pipelines as Code
    # They will automatically be expanded with the events from Github.
    - name: repo_url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"

  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    workspaces:
      - name: source
      - name: basic-auth

    tasks:
      # ── Step 1: Clone Repository ─────────────────────────────────────────
      # Clones the source code from GitHub into the shared workspace
      - name: fetch-repository
        taskRef:
          name: git-clone
        workspaces:
          - name: output
            workspace: source
          - name: basic-auth
            workspace: basic-auth
        params:
          - name: URL
            value: $(params.repo_url)
          - name: REVISION
            value: $(params.revision)

      # ── Step 2: Maven Build ──────────────────────────────────────────────
      # Compiles source code and packages into a JAR file
      # -DskipTests skips unit tests to speed up the build
      # JAR will be available at target/*.jar for S2I build
      - name: build
        runAfter:
          - fetch-repository
        workspaces:
          - name: maven-settings
            workspace: source
          - name: source
            workspace: source
        taskRef:
          name: maven
        params:
          - name: GOALS
            value:
              - clean
              - package
              - -DskipTests

      # ── Step 3: S2I Build ────────────────────────────────────────────────
      # Uploads JAR to OpenShift BuildConfig using S2I binary build strategy
      # No Dockerfile needed - S2I builder image wraps JAR automatically
      # BuildConfig and ImageStream must exist in demo-cicd namespace
      # Image is pushed to internal registry with latest tag
      - name: s2i-build
        runAfter:
          - build
        taskRef:
          name: openshift-client
        workspaces:
          - name: manifest-dir
            workspace: source
        params:
          - name: SCRIPT
            value: oc start-build spring-petclinic --from-dir=/workspace/manifest-dir/target --follow --wait -n demo-cicd

      # ── Step 4: Verify Image Tag ─────────────────────────────────────────
      # Verifies the latest tag is correctly set in the ImageStream
      # ArgoCD Image Updater watches this ImageStream for new latest tag
      - name: verify-tags
        runAfter:
          - s2i-build
        taskRef:
          name: openshift-client
        params:
          - name: SCRIPT
            value: oc get istag -n demo-cicd

  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  # This workspace will inject secret to help the git-clone task to be able to
  # checkout the private repositories
  - name: basic-auth
    secret:
      secretName: "{{ git_auth_secret }}"
